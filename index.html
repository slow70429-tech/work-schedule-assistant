<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>個人工作行程助手 V1.3</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--ink:#171717;--line:#333;--soft:#f3f3f3;--muted:#666;--paper:#fff}
    *{box-sizing:border-box} body{margin:0;background:#ececec;color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}
    .app{max-width:1250px;margin:0 auto;padding:20px}
    .toolbar{background:#fff;border:1px solid #bbb;border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 5px 18px rgba(0,0,0,.06)}
    h1{font-size:25px;margin:0 0 6px}.sub{color:var(--muted);font-size:14px;margin-bottom:16px}
    .controls{display:grid;grid-template-columns:2fr .8fr 1fr 1fr auto auto;gap:10px;align-items:end}
    label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
    input,button{width:100%;min-height:42px;border:1px solid #999;border-radius:8px;padding:8px 10px;font:inherit;background:#fff}
    input[type=file]{padding:7px} button{cursor:pointer;font-weight:800}.primary{background:#222;color:#fff;border-color:#222}.ghost{background:#fff}
    .status{margin-top:12px;padding:10px 12px;border:1px dashed #999;border-radius:8px;font-size:14px;background:#fafafa}
    .summary{font-weight:700;margin:0 0 10px}
    #output{display:flex;flex-direction:column;gap:20px}
    .week-page{background:var(--paper);border:1px solid #aaa;padding:8mm 7mm 7mm;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .week-title{text-align:center;font-weight:900;font-size:20px;margin-bottom:8px;letter-spacing:.5px}
    .week-meta{text-align:center;font-size:13px;margin-bottom:10px}
    .week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-left:2px solid var(--line);border-top:2px solid var(--line)}
    .day{border-right:2px solid var(--line);border-bottom:2px solid var(--line);display:flex;flex-direction:column;min-width:0}
    .day-head{text-align:center;background:#e7e7e7;border-bottom:2px solid var(--line);padding:7px 3px;font-weight:900;font-size:14px}
    .day.weekend .day-head{background:#d4d4d4}.day-body{padding:5px;display:flex;flex-direction:column;gap:5px;flex:1;overflow:visible}
    .empty{color:#888;text-align:center;margin:auto;font-size:13px}
    .job{border:1.2px solid #555;padding:4px 5px;break-inside:avoid;background:#fff}
    .job-title{font-size:12.5px;font-weight:900;line-height:1.25;word-break:break-word}.job-title .code{font-family:Arial,sans-serif;margin-right:3px}
    .loc{font-size:11px;margin-top:1px;word-break:break-word}.people{font-size:11px;margin-top:2px;font-weight:900;border-top:1px dotted #999;padding-top:2px}.tasks{margin:3px 0 0;padding:3px 0 0;border-top:1px solid #aaa;font-size:11px;line-height:1.25}
    .task{margin:0}.note{margin-top:3px;font-size:10.5px;line-height:1.2;font-weight:700}.vehicle{margin-top:3px;font-size:10.5px;border-top:1px dotted #777;padding-top:2px}
    .footer-note{text-align:right;margin-top:7px;font-size:10px;color:#555}
    @media(max-width:900px){.controls{grid-template-columns:1fr 1fr}.filebox{grid-column:1/-1}.week-page{overflow-x:auto}.week-grid{min-width:1050px}.day{min-height:560px}.app{padding:10px}}
    @page{size:A4 landscape;margin:8mm}
    @media print{
      body{background:#fff}.app{max-width:none;padding:0}.toolbar,.summary{display:none!important}#output{gap:0}
      .week-page{border:0;box-shadow:none;padding:0;min-height:0;page-break-after:always;width:281mm;height:194mm;overflow:hidden}.week-page:last-child{page-break-after:auto}
      .week-title{font-size:16px;margin:0 0 2px;line-height:1.1}.week-meta{font-size:9px;margin-bottom:3px;line-height:1.1}
      .week-grid{height:174mm;grid-template-columns:repeat(7,1fr)}.day{min-height:0;height:174mm}.day-head{font-size:10px;padding:3px 1px;line-height:1.1}.day-body{padding:3px;gap:3px}
      .job{padding:3px 4px}.job-title{font-size:9px;line-height:1.15}.loc,.people,.tasks{font-size:7.8px;line-height:1.15}.tasks{margin-top:2px;padding-top:2px}.note,.vehicle{font-size:7.2px;line-height:1.15;margin-top:2px}.footer-note{font-size:6.5px;margin-top:2px;line-height:1}
      .empty{font-size:9px;margin:auto}
    }
  </style>
</head>
<body>
<div class="app">
  <section class="toolbar">
    <h1>個人工作行程助手 <small style="font-size:13px">V1.3</small></h1>
    <div class="sub">匯入公司的 Excel，自動篩選人員欄包含指定代號的工作，按星期一至星期日橫向列印。</div>
    <div class="controls">
      <div class="filebox"><label>公司行程 Excel</label><input id="file" type="file" accept=".xlsx,.xls" /></div>
      <div><label>人員代號</label><input id="person" value="周" /></div>
      <div><label>開始日期</label><input id="start" type="date" /></div>
      <div><label>結束日期</label><input id="end" type="date" /></div>
      <button class="primary" id="build">產生行程</button>
      <button class="ghost" id="print">列印</button>
    </div>
    <div id="status" class="status">請先選擇 Excel。預設日期為今天到本月底。</div>
  </section>
  <div id="summary" class="summary"></div>
  <main id="output"></main>
</div>
<script>
(() => {
  const $ = id => document.getElementById(id);
  let workbook = null;
  const pad = n => String(n).padStart(2,'0');
  const isoLocal = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today = new Date();
  $('start').value = isoLocal(today);
  $('end').value = isoLocal(new Date(today.getFullYear(), today.getMonth()+1, 0));
  const esc = s => String(s ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  function parseDate(v){
    if(v == null || v === '') return null;
    if(v instanceof Date && !isNaN(v)) return new Date(v.getFullYear(),v.getMonth(),v.getDate());
    if(typeof v === 'number'){
      const o = XLSX.SSF.parse_date_code(v); if(o) return new Date(o.y,o.m-1,o.d);
    }
    const s=String(v).trim().replace(/\./g,'/').replace(/-/g,'/');
    let m=s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
    return null;
  }
  function monday(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
  function sameDay(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
  function dayKey(d){return isoLocal(d)}
  function clean(v){return v == null ? '' : String(v).trim()}

  $('file').addEventListener('change', async e => {
    const f=e.target.files[0]; if(!f) return;
    try{
      $('status').textContent='正在讀取 Excel…';
      const data=await f.arrayBuffer(); workbook=XLSX.read(data,{type:'array',cellDates:true});
      const sheet=workbook.SheetNames.includes('行事曆')?'行事曆':workbook.SheetNames[0];
      $('status').textContent=`已讀取：${f.name}｜工作表：${sheet}。按「產生行程」。`;
    }catch(err){workbook=null;$('status').textContent='讀取失敗：'+err.message}
  });

  function extract(){
    if(!workbook) throw new Error('請先選擇 Excel 檔案。');
    const sheetName=workbook.SheetNames.includes('行事曆')?'行事曆':workbook.SheetNames[0];
    const rows=XLSX.utils.sheet_to_json(workbook.Sheets[sheetName],{header:1,defval:'',raw:true});
    const token=$('person').value.trim(); if(!token) throw new Error('請輸入人員代號。');
    const start=new Date($('start').value+'T00:00:00'); const end=new Date($('end').value+'T23:59:59');
    if(isNaN(start)||isNaN(end)||start>end) throw new Error('日期範圍不正確。');
    const jobs=[];
    // 公司行事曆格式：星期一 A:I，星期二 J:Q，之後每一天 8 欄；日期在每組最後一欄。
    const dayStarts=[1,9,17,25,33,41,49];
    const dateCols=[8,16,24,32,40,48,56];
    for(let r=3;r<rows.length;r++){
      const row=rows[r]||[]; const category=clean(row[0]);
      for(let d=0;d<7;d++){
        const dt=parseDate(row[dateCols[d]]); if(!dt||dt<start||dt>end) continue;
        const s=dayStarts[d];
        const code=clean(row[s]), name=clean(row[s+1]), location=clean(row[s+2]), person=clean(row[s+3]);
        const vehicle=clean(row[s+4]), qty=clean(row[s+5]), note=clean(row[s+6]);
        if(!person.includes(token)) continue;
        if(!code&&!name&&!location&&!category) continue;
        jobs.push({date:dt,category,code,name,location,person,vehicle,qty,note});
      }
    }
    return {jobs,start,end,token};
  }

  function groupedForDay(items){
    const map=new Map();
    for(const j of items){
      const key=[j.code,j.name,j.location,j.person,j.vehicle].join('|');
      if(!map.has(key)) map.set(key,{...j,tasks:[],notes:[]});
      const g=map.get(key);
      if(j.category){
        const exists=g.tasks.some(t=>t.name===j.category&&t.qty===j.qty);
        if(!exists) g.tasks.push({name:j.category,qty:j.qty});
      }
      if(j.note&&!g.notes.includes(j.note)) g.notes.push(j.note);
    }
    return [...map.values()];
  }
  function renderJob(j){
    const title=[j.code,j.name].filter(Boolean).map(esc).join(' ');
    const loc=j.location?`<div class="loc">地點／項目：${esc(j.location)}</div>`:'';
    const tasks=j.tasks.map(t=>`<div class="task">□ ${esc(t.name)}${t.qty?` (${esc(t.qty)})`:''}</div>`).join('');
    const people=`<div class="people">人員：${esc(j.person || '未填')}</div>`;
    const notes=j.notes.length?`<div class="note">★ ${esc(j.notes.join('；'))}</div>`:'';
    const vehicle=j.vehicle?`<div class="vehicle">車輛：${esc(j.vehicle)}</div>`:'';
    return `<section class="job"><div class="job-title"><span class="code">${title||'未命名工作'}</span></div>${loc}${people}<div class="tasks">${tasks||'□ 工作'}</div>${notes}${vehicle}</section>`;
  }
  function render(){
    try{
      const {jobs,start,end,token}=extract(); const byDate=new Map();
      for(const j of jobs){const k=dayKey(j.date);if(!byDate.has(k))byDate.set(k,[]);byDate.get(k).push(j)}
      const first=monday(start), last=monday(end); let pages=''; let weekCount=0;
      for(let w=new Date(first);w<=last;w=addDays(w,7)){
        weekCount++; const we=addDays(w,6); let cells='';
        for(let i=0;i<7;i++){
          const d=addDays(w,i), inRange=d>=new Date(start.getFullYear(),start.getMonth(),start.getDate())&&d<=new Date(end.getFullYear(),end.getMonth(),end.getDate());
          const gs=groupedForDay(byDate.get(dayKey(d))||[]); const body=gs.length?gs.map(renderJob).join(''):`<div class="empty">${inRange?'無行程':'—'}</div>`;
          cells+=`<article class="day ${i>=5?'weekend':''}"><header class="day-head">${d.getMonth()+1}/${d.getDate()}（${'一二三四五六日'[i]}）</header><div class="day-body">${body}</div></article>`;
        }
        pages+=`<section class="week-page"><div class="week-title">${esc(token)}　個人工作行程</div><div class="week-meta">${w.getFullYear()}/${pad(w.getMonth()+1)}/${pad(w.getDate())} ～ ${we.getFullYear()}/${pad(we.getMonth()+1)}/${pad(we.getDate())}</div><div class="week-grid">${cells}</div><div class="footer-note">由個人工作行程助手 V1.3 整理｜人員欄包含「${esc(token)}」</div></section>`;
      }
      $('output').innerHTML=pages; $('summary').textContent=`共找到 ${jobs.length} 筆原始行程，整理成 ${weekCount} 個星期。`;
      $('status').textContent='V1.3 行程已產生。每張卡片都會顯示原始人員組合。';
    }catch(err){$('status').textContent=err.message;$('output').innerHTML='';$('summary').textContent=''}
  }
  $('build').addEventListener('click',render); $('print').addEventListener('click',()=>window.print());
})();
</script>
</body>
</html>
